<!doctype html>
<html lang="ja">
<head>

  <title>特定商取引法に基づく表記｜磯屋コマース</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:#f7f3ec;color:#2b2118;line-height:1.8}
    .wrap{max-width:860px;margin:0 auto;padding:24px 16px 56px}
    .card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 4px 18px rgba(0,0,0,.08)}
    h1{font-size:24px;color:#5a2f13;margin:0 0 16px}
    table{width:100%;border-collapse:collapse;margin-top:16px}
    th,td{border:1px solid #e4d8c8;padding:10px;text-align:left;vertical-align:top}
    th{background:#f2e6d6;width:30%}
    a{color:#5a2f13;font-weight:700}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>特定商取引法に基づく表記</h1>
      <table>
        <tr><th>販売者</th><td>磯屋コマース</td></tr>
        <tr><th>販売商品</th><td>手造りえびせんべい</td></tr>
        <tr><th>販売価格</th><td>各商品ページに表示された価格に基づきます。</td></tr>

        <tr><th>引渡し時期</th><td>ご注文確認後、準備が整い次第発送いたします。</td></tr>
        <tr><th>返品交換</th><td>食品のため、お客様都合による返品交換は原則としてお受けできません。商品に不備がある場合はご連絡ください。</td></tr>
        <tr><th>連絡先</th><td>お問い合わせはLINE公式アカウントまたは当店指定の連絡先よりお願いいたします。</td></tr>
      </table>
      <p><a href="/">トップへ戻る</a></p>
    </section>
  </main>

</html>
